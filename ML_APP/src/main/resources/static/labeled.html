<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Labeled Reviews</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
    <style>
        body{background:#f4f6f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
        .topbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
        .main{max-width:1000px;margin:20px auto;padding:0 16px}
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }

        .labeled-card{background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:16px;transition:box-shadow .2s; height: 100%; display: flex; flex-direction: column;}
        .labeled-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.05)}
        .lbl-aspect{font-weight:600;color:#3b5bdb; background: #f0f4ff; padding: 4px 10px; border-radius: 6px; display: inline-block; margin-bottom: 10px;}
        .lbl-sentiment{font-size:12px; font-weight:bold; padding:3px 8px; border-radius:4px; text-transform:uppercase;}
        .sentiment-0 { background: #fee2e2; color: #dc2626; } /* Negative */
        .sentiment-1 { background: #f3f4f6; color: #4b5563; } /* Neutral */
        .sentiment-2 { background: #dcfce7; color: #16a34a; } /* Positive */

        .sentence { font-size: 14px; color: #374151; flex-grow: 1; margin-top: 10px;}
        .stars { color: #f59e0b; font-size: 14px; margin-bottom: 8px;}

        .pagination-bar { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 30px; margin-bottom: 50px;}
        .btn-page { background: #fff; border: 1px solid #d1d5db; border-radius: 8px; padding: 8px 16px; cursor: pointer; transition: 0.2s;}
        .btn-page:hover:not(:disabled) { background: #f9fafb; border-color: #9ca3af; }
        .btn-page:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="topbar">
    <div style="display:flex;align-items:center;gap:12px">
        <i class="ti ti-database" style="font-size:20px;color:#16a34a"></i>
        <h1 style="font-size:16px; margin:0">Dữ liệu đã gán nhãn (Aspects)</h1>
    </div>
    <a href="/" class="btn btn-sm btn-outline-primary">Về trang gán nhãn</a>
</div>

<div class="main">
    <div style="margin-bottom: 15px; color: #6b7280; font-size: 14px;" id="totalElements">Đang tải dữ liệu...</div>

    <div class="grid-container" id="dataGrid">
    </div>

    <div class="pagination-bar">
        <button class="btn-page" id="btnPrev" onclick="changePage(-1)"><i class="ti ti-chevron-left"></i> Trước</button>
        <span id="pageInfo" style="font-weight:500; font-size:14px">Trang 1 / 1</span>
        <button class="btn-page" id="btnNext" onclick="changePage(1)">Sau <i class="ti ti-chevron-right"></i></button>
    </div>
</div>

<script>
    let currentPage = 0;
    const pageSize = 12; // Số lượng thẻ trên 1 trang

    const SENTIMENT_MAP = {
        0: { text: 'Negative', class: 'sentiment-0' },
        1: { text: 'Neutral', class: 'sentiment-1' },
        2: { text: 'Positive', class: 'sentiment-2' }
    };

    async function loadLabeledData() {
        const grid = document.getElementById('dataGrid');
        grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:40px;"><div class="spinner-border text-primary" role="status"></div></div>';

        try {
            const res = await fetch(`/api/labeled?page=${currentPage}&size=${pageSize}`);
            if (!res.ok) throw new Error("Lỗi fetch API");

            const pageData = await res.json();
            // pageData của Spring Boot thường có dạng: { content: [...], totalPages: X, totalElements: Y, last: boolean, first: boolean }

            renderData(pageData.content);
            updatePagination(pageData);

        } catch (error) {
            console.error(error);
            grid.innerHTML = `<div class="alert alert-danger">Lỗi khi tải dữ liệu: ${error.message}</div>`;
        }
    }

    function renderData(items) {
        const grid = document.getElementById('dataGrid');
        if (!items || items.length === 0) {
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; color:#6b7280;">Chưa có dữ liệu nào được gán nhãn.</div>';
            return;
        }

        grid.innerHTML = items.map(item => {
            const sentiment = SENTIMENT_MAP[item.label] || { text: 'Unknown', class: 'sentiment-1' };
            const stars = '★'.repeat(item.rating || 0) + '☆'.repeat(5 - (item.rating || 0));

            return `
                <div class="labeled-card">
                    <div style="display:flex; justify-content:space-between; align-items:start;">
                        <span class="lbl-aspect"><i class="ti ti-tag"></i> ${item.aspect}</span>
                        <span class="lbl-sentiment ${sentiment.class}">${sentiment.text}</span>
                    </div>
                    <div class="stars" title="Rating: ${item.rating}/5">${stars}</div>
                    <div class="sentence">"${item.sentence}"</div>
                </div>
            `;
        }).join('');
    }

    function updatePagination(pageData) {
        document.getElementById('totalElements').textContent = `Tổng cộng: ${pageData.totalElements} bản ghi đã gán aspect`;
        document.getElementById('pageInfo').textContent = `Trang ${pageData.number + 1} / ${pageData.totalPages || 1}`;

        document.getElementById('btnPrev').disabled = pageData.first;
        document.getElementById('btnNext').disabled = pageData.last;
    }

    function changePage(delta) {
        currentPage += delta;
        if (currentPage < 0) currentPage = 0;
        loadLabeledData();
        window.scrollTo(0, 0); // Cuộn lên đầu trang
    }

    // Load lần đầu tiên
    loadLabeledData();
</script>
</body>
</html>
